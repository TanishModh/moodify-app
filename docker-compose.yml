version: '3.8'

services:
  ai_ml:
    build:
      context: .
      dockerfile: ai_ml/Dockerfile
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - mongodb

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # MongoDB Atlas connection
      MONGODB_URI: mongodb+srv://moodify-admin:moodifymeproject123@cluster0.qtozrzs.mongodb.net/
      # AI/ML service URL
      AI_ML_URL: http://ai_ml:5000
      # Django settings
      DJANGO_SECRET_KEY: your-secret-key-here
      DJANGO_DEBUG: "False"
    restart: always
    depends_on:
      - ai_ml
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://backend:8000
    restart: always
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
